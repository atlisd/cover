services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: splitclaude
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Cover.Api/Dockerfile
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=splitclaude;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: src/Cover.Web/Dockerfile
    ports:
      - "5002:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
